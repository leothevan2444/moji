scalar Long

"Basic service health"
type Health {
  ok: Boolean!
  message: String!
}

type Query {
  health: Health!
  version: String!

  "Search torrents via Jackett"
  jackettSearch(input: JackettSearchInput!): [JackettSearchResult!]!

  "List torrents from qBittorrent"
  qbittorrentTorrents(limit: Int): [QBTorrent!]!

  "Get a Stash background job by id"
  stashJob(id: ID!): StashJob
}

input JackettSearchInput {
  query: String!
  trackers: [String!]
  categories: [Int!]
  limit: Int
}

type JackettSearchResult {
  title: String!
  size: Long!
  seeders: Int!
  peers: Int!
  tracker: String!
  trackerId: String!
  categoryDesc: String!
  publishDate: String!
  details: String!
  link: String!
  magnetUri: String!
}

type QBTorrent {
  hash: String!
  name: String!
  progress: Float!
  state: String!
  dlspeed: Long!
  upspeed: Long!
  size: Long!
  eta: Long!
  category: String!
  tags: String!
  addedOn: Long!
}

type Mutation {
  "Add a torrent to qBittorrent via magnet or http(s) URL"
  qbittorrentAdd(input: QBittorrentAddInput!): Boolean!

  "Start a Stash metadata scan"
  stashMetadataScan(input: StashMetadataScanInput!): ID!
}

input QBittorrentAddInput {
  url: String!
  savePath: String
  category: String
  tags: String
  paused: Boolean
}

input StashMetadataScanInput {
  paths: [String!]
  rescan: Boolean
  scanGenerateCovers: Boolean
  scanGeneratePreviews: Boolean
  scanGenerateImagePreviews: Boolean
  scanGenerateSprites: Boolean
  scanGeneratePhashes: Boolean
  scanGenerateThumbnails: Boolean
  scanGenerateClipPreviews: Boolean
}

type StashJob {
  id: ID!
  status: String!
  description: String!
  progress: Float
  startTime: String
  endTime: String
  addTime: String!
  error: String
  subTasks: [String!]
}
