scalar Long

"Basic service health"
type Health {
  ok: Boolean!
  message: String!
}

type Query {
  health: Health!
  version: String!

  "Search torrents via Jackett"
  jackettSearch(input: JackettSearchInput!): [JackettSearchResult!]!

  "List torrents from qBittorrent"
  qbittorrentTorrents(limit: Int): [QBTorrent!]!

  "Get a Moji download task by id"
  task(id: ID!): Task

  "List Moji download tasks, newest first"
  tasks: [Task!]!

  "Get a Stash background job by id"
  stashJob(id: ID!): StashJob
}

input JackettSearchInput {
  query: String!
  trackers: [String!]
  categories: [Int!]
  limit: Int
}

type JackettSearchResult {
  title: String!
  size: Long!
  seeders: Int!
  peers: Int!
  tracker: String!
  trackerId: String!
  categoryDesc: String!
  publishDate: String!
  details: String!
  link: String!
  magnetUri: String!
}

type QBTorrent {
  hash: String!
  name: String!
  progress: Float!
  state: String!
  dlspeed: Long!
  upspeed: Long!
  size: Long!
  eta: Long!
  category: String!
  tags: String!
  addedOn: Long!
}

type Mutation {
  "Add a torrent to qBittorrent via magnet or http(s) URL"
  qbittorrentAdd(input: QBittorrentAddInput!): Boolean! @deprecated(reason: "Use addTorrent for persisted Moji task tracking.")

  "Add a torrent URL or magnet and create a persisted Moji task"
  addTorrent(input: QBittorrentAddInput!): Task!

  "Search torrent candidates and create a Moji download task"
  downloadMedia(input: DownloadMediaInput!): Task!

  "Synchronize Moji task progress from qBittorrent"
  syncTaskProgress: [Task!]!

  "Start a Stash metadata scan"
  stashMetadataScan(input: StashMetadataScanInput!): ID!
}

input QBittorrentAddInput {
  url: String!
  savePath: String
  category: String
  tags: String
  paused: Boolean
}

input DownloadMediaInput {
  query: String!
  trackers: [String!]
  categories: [Int!]
  limit: Int
  savePath: String
  category: String
  tags: String
  paused: Boolean
}

type Task {
  id: ID!
  query: String!
  status: String!
  candidate: DownloadCandidate!
  torrentUrl: String!
  savePath: String!
  category: String!
  tags: String!
  torrentHash: String!
  torrentName: String!
  progress: Float!
  qbittorrentState: String!
  contentPath: String!
  completedAt: String
  error: String!
  createdAt: String!
  updatedAt: String!
}

type DownloadCandidate {
  title: String!
  tracker: String!
  infoHash: String!
  link: String!
  magnetUri: String!
  size: Long!
  seeders: Int!
  peers: Int!
}

input StashMetadataScanInput {
  paths: [String!]
  rescan: Boolean
  scanGenerateCovers: Boolean
  scanGeneratePreviews: Boolean
  scanGenerateImagePreviews: Boolean
  scanGenerateSprites: Boolean
  scanGeneratePhashes: Boolean
  scanGenerateThumbnails: Boolean
  scanGenerateClipPreviews: Boolean
}

type StashJob {
  id: ID!
  status: String!
  description: String!
  progress: Float
  startTime: String
  endTime: String
  addTime: String!
  error: String
  subTasks: [String!]
}
