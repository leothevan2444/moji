extend type Query {
  "Retrieve recent Moji logs for troubleshooting"
  logs(limit: Int = 200, minLevel: LogLevel = Info): [LogEntry!]!
}

enum LogLevel {
  Debug
  Info
  Warning
  Error
}

type LogEntry {
  sequence: Int!
  time: String!
  level: LogLevel!
  message: String!
}

type LogEvent {
  sequence: Int!
  entry: LogEntry!
}

extend type Subscription {
  "Stream new in-memory Moji log entries"
  logEvents: LogEvent!
}
