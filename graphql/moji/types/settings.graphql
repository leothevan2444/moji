extend type Query {
  "Get runtime capability and configuration state for the Settings surface"
  settings: Settings!
}

extend type Mutation {
  "Update Stash settings and persist them to backend config"
  updateStashSettings(input: UpdateStashSettingsInput!): Settings!

  "Update Jackett settings and persist them to backend config"
  updateJackettSettings(input: UpdateJackettSettingsInput!): Settings!

  "Update qBittorrent settings and persist them to backend config"
  updateQBittorrentSettings(input: UpdateQBittorrentSettingsInput!): Settings!

  "Update Subscription settings and persist them to backend config"
  updateSubscriptionSettings(input: UpdateSubscriptionSettingsInput!): Settings!

  "Re-fetch the Stash-Box list from the configured Stash server. The updated list and load status are reflected in the returned Settings snapshot."
  refreshSubscriptionStashBoxes: Settings!

  "Update logging settings and persist them to backend config"
  updateLoggingSettings(input: UpdateLoggingSettingsInput!): Settings!
}

type Settings {
  stash: StashSettings!
  jackett: JackettSettings!
  qbittorrent: QBittorrentSettings!
  tasks: TaskSettings!
  subscription: SubscriptionSettings!
  logging: LoggingSettings!
  system: SystemSettings!
}

type StashSettings {
  configured: Boolean!
  enabled: Boolean!
  url: String!
  apiKeyConfigured: Boolean!
  "Currently configured Stash API key. Returned in plaintext for the settings UI; never logged."
  apiKey: String!
  libraryPath: String!
}

type JackettSettings {
  configured: Boolean!
  enabled: Boolean!
  url: String!
  apiKeyConfigured: Boolean!
  "Currently configured Jackett API key. Returned in plaintext for the settings UI; never logged."
  apiKey: String!
}

type QBittorrentSettings {
  configured: Boolean!
  enabled: Boolean!
  url: String!
  username: String!
  usernameConfigured: Boolean!
  passwordConfigured: Boolean!
  "Currently configured qBittorrent password. Returned in plaintext for the settings UI; never logged."
  password: String!
  defaultSavePath: String!
  category: String!
  tags: String!
}

type TaskSettings {
  store: String!
  dbPath: String!
  progressSyncIntervalSeconds: Int!
  progressSyncEnabled: Boolean!
}

type SubscriptionSettings {
  store: String!
  dbPath: String!
  pollIntervalSeconds: Int!
  pollEnabled: Boolean!
  "Stash Box instances currently configured inside the Stash server."
  stashBoxes: [StashBoxEndpoint!]!
  "Endpoint URLs in the user-defined order used for subscription lookups. Endpoints not listed here are still queried, in their Stash order, appended after the listed ones. An empty list means use Stash's order as-is."
  stashBoxEndpoints: [String!]!
  "Whether the last attempt to load Stash Box endpoints from Stash succeeded."
  stashBoxesLoaded: Boolean!
  "Reason for the most recent Stash Box load failure. Null when stashBoxesLoaded is true."
  stashBoxesLoadError: String
}

type StashBoxEndpoint {
  name: String!
  endpoint: String!
  apiKeyConfigured: Boolean!
}

type LoggingSettings {
  level: String!
  filePath: String!
  maxEntries: Int!
  maxFileSizeBytes: Int!
  maxFileBackups: Int!
}

type SystemSettings {
  appVersion: String!
}

input UpdateStashSettingsInput {
  url: String!
  apiKey: String
  libraryPath: String!
}

input UpdateJackettSettingsInput {
  url: String!
  apiKey: String
}

input UpdateQBittorrentSettingsInput {
  url: String!
  username: String!
  password: String
  defaultSavePath: String!
  category: String!
  tags: String!
}

input UpdateSubscriptionSettingsInput {
  store: String!
  dbPath: String!
  pollIntervalSeconds: Int!
  "See SubscriptionSettings.stashBoxEndpoints."
  stashBoxEndpoints: [String!]!
}

input UpdateLoggingSettingsInput {
  level: String!
  filePath: String!
  maxEntries: Int!
  maxFileSizeBytes: Int!
  maxFileBackups: Int!
}
