extend type Query {
  "Get runtime capability and configuration state for the Settings surface"
  settings: Settings!
}

extend type Mutation {
  "Update Stash settings and persist them to backend config"
  updateStashSettings(input: UpdateStashSettingsInput!): Settings!

  "Update Jackett settings and persist them to backend config"
  updateJackettSettings(input: UpdateJackettSettingsInput!): Settings!

  "Update qBittorrent settings and persist them to backend config"
  updateQBittorrentSettings(input: UpdateQBittorrentSettingsInput!): Settings!
}

type Settings {
  stash: StashSettings!
  jackett: JackettSettings!
  qbittorrent: QBittorrentSettings!
  tasks: TaskSettings!
  system: SystemSettings!
}

type StashSettings {
  configured: Boolean!
  enabled: Boolean!
  graphqlUrl: String!
  apiKeyConfigured: Boolean!
  libraryPath: String!
}

type JackettSettings {
  configured: Boolean!
  enabled: Boolean!
  url: String!
  apiKeyConfigured: Boolean!
}

type QBittorrentSettings {
  configured: Boolean!
  enabled: Boolean!
  url: String!
  username: String!
  usernameConfigured: Boolean!
  passwordConfigured: Boolean!
  defaultSavePath: String!
  category: String!
  tags: String!
}

type TaskSettings {
  store: String!
  jsonPath: String!
  progressSyncIntervalSeconds: Int!
  progressSyncEnabled: Boolean!
}

type SystemSettings {
  appVersion: String!
}

input UpdateStashSettingsInput {
  graphqlUrl: String!
  apiKey: String
  libraryPath: String!
}

input UpdateJackettSettingsInput {
  url: String!
  apiKey: String
}

input UpdateQBittorrentSettingsInput {
  url: String!
  username: String!
  password: String
  defaultSavePath: String!
  category: String!
  tags: String!
}
