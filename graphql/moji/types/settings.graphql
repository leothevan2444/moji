extend type Query {
  "Get runtime capability and configuration state for the Settings surface"
  settings: Settings!
}

extend type Mutation {
  "Update Stash settings and persist them to backend config"
  updateStashSettings(input: UpdateStashSettingsInput!): Settings!

  "Update Jackett settings and persist them to backend config"
  updateJackettSettings(input: UpdateJackettSettingsInput!): Settings!

  "Update qBittorrent settings and persist them to backend config"
  updateQBittorrentSettings(input: UpdateQBittorrentSettingsInput!): Settings!

  "Update Subscription settings and persist them to backend config"
  updateSubscriptionSettings(input: UpdateSubscriptionSettingsInput!): Settings!

  "Update logging settings and persist them to backend config"
  updateLoggingSettings(input: UpdateLoggingSettingsInput!): Settings!
}

type Settings {
  stash: StashSettings!
  jackett: JackettSettings!
  qbittorrent: QBittorrentSettings!
  tasks: TaskSettings!
  subscription: SubscriptionSettings!
  logging: LoggingSettings!
  system: SystemSettings!
}

type StashSettings {
  configured: Boolean!
  enabled: Boolean!
  url: String!
  apiKeyConfigured: Boolean!
  libraryPath: String!
}

type JackettSettings {
  configured: Boolean!
  enabled: Boolean!
  url: String!
  apiKeyConfigured: Boolean!
}

type QBittorrentSettings {
  configured: Boolean!
  enabled: Boolean!
  url: String!
  username: String!
  usernameConfigured: Boolean!
  passwordConfigured: Boolean!
  defaultSavePath: String!
  category: String!
  tags: String!
}

type TaskSettings {
  store: String!
  dbPath: String!
  progressSyncIntervalSeconds: Int!
  progressSyncEnabled: Boolean!
}

type SubscriptionSettings {
  store: String!
  dbPath: String!
  pollIntervalSeconds: Int!
  pollEnabled: Boolean!
  javstashEnabled: Boolean!
  javstashApiKeyConfigured: Boolean!
}

type LoggingSettings {
  level: String!
  filePath: String!
  maxEntries: Int!
  maxFileSizeBytes: Int!
  maxFileBackups: Int!
}

type SystemSettings {
  appVersion: String!
}

input UpdateStashSettingsInput {
  url: String!
  apiKey: String
  libraryPath: String!
}

input UpdateJackettSettingsInput {
  url: String!
  apiKey: String
}

input UpdateQBittorrentSettingsInput {
  url: String!
  username: String!
  password: String
  defaultSavePath: String!
  category: String!
  tags: String!
}

input UpdateSubscriptionSettingsInput {
  store: String!
  dbPath: String!
  pollIntervalSeconds: Int!
  javstashApiKey: String
}

input UpdateLoggingSettingsInput {
  level: String!
  filePath: String!
  maxEntries: Int!
  maxFileSizeBytes: Int!
  maxFileBackups: Int!
}
