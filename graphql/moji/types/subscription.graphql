extend type Query {
  "List Stash performers with current Moji subscription state"
  stashPerformers(search: String, page: Int = 1, pageSize: Int = 24): StashPerformerConnection!

  "Fetch Stash performer detail with Moji / StashBox context"
  stashPerformerDetail(id: ID!): StashPerformerDetail!

  "List deduplicated performer scenes from Stash and the preferred StashBox"
  stashPerformerScenes(id: ID!, input: StashPerformerScenesInput!): StashPerformerSceneConnection!

  "List performers currently subscribed by Moji"
  subscribedPerformers: [SubscribedPerformer!]!
}

extend type Mutation {
  "Mark a Stash performer as subscribed by Moji"
  subscribePerformer(stashPerformerID: ID!): SubscribedPerformer!

  "Remove Moji subscription mark from a Stash performer"
  unsubscribePerformer(stashPerformerID: ID!): Boolean!

  "Refresh a subscribed performer against the configured release source"
  refreshSubscribedPerformer(stashPerformerID: ID!): SubscribedPerformer!

  "Refresh all subscribed performers against the configured release source"
  refreshSubscriptionsNow: [SubscribedPerformer!]!

  "Queue selected performer scenes into the standard Moji download workflow"
  queuePerformerScenes(input: QueuePerformerScenesInput!): QueuePerformerScenesPayload!

  "Force-refresh one performer StashBox cache and return the requested page"
  refreshStashPerformerScenes(id: ID!, input: StashPerformerScenesInput!): StashPerformerSceneConnection!
}

type StashPerformer {
  id: ID!
  name: String!
  aliasList: [String!]!
  favorite: Boolean!
  imagePath: String
  sceneCount: Int!
  subscribed: Boolean!
}

type StashPerformerDetail {
  performer: StashPerformer!
  disambiguation: String
  birthdate: String
  ethnicity: String
  country: String
  eyeColor: String
  heightCm: Int
  rating100: Int
  urls: [String!]!
  matchedStashBox: MatchedStashBox
  totalSceneCount: Int!
  stashSceneCount: Int!
  stashBoxSceneCount: Int!
  dedupedSceneCount: Int!
}

type MatchedStashBox {
  name: String!
  endpoint: String!
  performerId: ID!
  performerName: String!
}

type StashPerformerConnection {
  items: [StashPerformer!]!
  page: Int!
  pageSize: Int!
  totalCount: Int!
  totalPages: Int!
  hasPrevPage: Boolean!
  hasNextPage: Boolean!
}

input StashPerformerScenesInput {
  search: String
  source: SceneSourceFilter = ALL
  inLibrary: LibraryFilter = ALL
  page: Int = 1
  pageSize: Int = 24
}

enum SceneSourceFilter {
  ALL
  STASH
  STASHBOX
}

enum LibraryFilter {
  ALL
  IN_LIBRARY
  NOT_IN_LIBRARY
}

enum SceneSource {
  STASH
  STASHBOX
}

type StashPerformerSceneConnection {
  items: [StashPerformerScene!]!
  page: Int!
  pageSize: Int!
  totalCount: Int!
  totalPages: Int
  hasPrevPage: Boolean!
  hasNextPage: Boolean!
  stashSceneCount: Int!
  stashBoxCount: Int!
  dedupedCount: Int!
  totalCountExact: Boolean!
  stashBoxRemoteCount: Int!
  stashBoxLoadedCount: Int!
  cacheComplete: Boolean!
  cacheUpdatedAt: String
  cacheStale: Boolean!
}

type StashPerformerScene {
  key: ID!
  primarySource: SceneSource!
  sourceSceneId: ID!
  title: String
  code: String
  date: String
  studioName: String
  performerCount: Int!
  tagCount: Int!
  performers: [PerformerScenePerson!]!
  tags: [PerformerSceneTag!]!
  imageUrl: String
  url: String
  inLibrary: Boolean!
  matchedStashSceneId: ID
  hasStashSource: Boolean!
  hasStashBoxSource: Boolean!
  stashBoxSceneId: ID
  stashBoxEndpoint: String
  sourceLabels: [String!]!
  stashIds: [StashSceneID!]!
  mojiTask: PerformerSceneTask
}

type PerformerScenePerson {
  id: ID!
  name: String!
}

type PerformerSceneTag {
  id: ID!
  name: String!
}

type PerformerSceneTask {
  id: ID!
  stage: TaskStage!
  stageStatus: TaskStageStatus!
  stageLabel: String!
  stageStatusLabel: String!
  progress: Float!
}

type StashSceneID {
  endpoint: String!
  stashId: String!
}

type SubscribedPerformer {
  performer: StashPerformer!
  lastCheckedAt: String
  lastError: String
  pendingReleaseCount: Int!
  processedReleaseCount: Int!
  recentReleases: [SubscriptionRelease!]!
}

type SubscriptionRelease {
  key: ID!
  source: String!
  title: String!
  code: String
  date: String
  url: String
  taskID: ID
  performerCount: Int!
  performerNames: [String!]!
  seenAt: String!
}

input QueuePerformerScenesInput {
  performerId: ID!
  scenes: [QueuePerformerSceneInput!]!
}

input QueuePerformerSceneInput {
  key: ID!
  sourceSceneId: ID!
  stashBoxSceneId: ID
  stashBoxEndpoint: String
  code: String
  title: String
  inLibrary: Boolean!
}

type QueuePerformerScenesPayload {
  queuedTasks: [Task!]!
  results: [QueuePerformerSceneResult!]!
  summary: QueuePerformerScenesSummary!
}

type QueuePerformerSceneResult {
  key: ID!
  status: QueuePerformerSceneStatus!
  reasonCode: String!
  message: String!
  task: Task
  resolvedCode: String
}

type QueuePerformerScenesSummary {
  requestedCount: Int!
  queuedCount: Int!
  skippedCount: Int!
  failedCount: Int!
}

enum QueuePerformerSceneStatus {
  QUEUED
  SKIPPED
  FAILED
}
