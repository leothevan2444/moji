extend type Query {
  "List torrents from qBittorrent"
  qbittorrentTorrents(limit: Int): [QBTorrent!]!

  "Get a Moji download task by id"
  task(id: ID!): Task

  "List Moji download tasks, newest first"
  tasks: [Task!]!
}

type Mutation {
  "Add a torrent to qBittorrent via magnet or http(s) URL"
  qbittorrentAdd(input: QBittorrentAddInput!): Boolean! @deprecated(reason: "Use addTorrent for persisted Moji task tracking.")

  "Add a torrent URL or magnet and create a persisted Moji task"
  addTorrent(input: QBittorrentAddInput!): Task!

  "Search torrent candidates and create a Moji download task"
  downloadMedia(input: DownloadMediaInput!): Task!

  "Synchronize Moji task progress from qBittorrent"
  syncTaskProgress: [Task!]!

  "Trigger a Stash metadata scan for a single completed Moji task"
  triggerTaskStashScan(id: ID!): Task!

  "Trigger Stash metadata scans for completed Moji tasks"
  triggerStashScans: [Task!]!
}

type QBTorrent {
  hash: String!
  name: String!
  progress: Float!
  state: String!
  dlspeed: Long!
  upspeed: Long!
  size: Long!
  eta: Long!
  category: String!
  tags: String!
  addedOn: Long!
}

input QBittorrentAddInput {
  url: String!
  savePath: String
  category: String
  tags: String
  paused: Boolean
}

input DownloadMediaInput {
  query: String!
  trackers: [String!]
  categories: [Int!]
  limit: Int
  savePath: String
  category: String
  tags: String
  paused: Boolean
}

type Task {
  id: ID!
  query: String!
  status: String!
  candidate: DownloadCandidate!
  torrentUrl: String!
  savePath: String!
  category: String!
  tags: String!
  torrentHash: String!
  torrentName: String!
  progress: Float!
  qbittorrentState: String!
  contentPath: String!
  completedAt: String
  stashJobId: ID!
  stashScanStatus: String!
  stashScanError: String!
  stashScanStartedAt: String
  error: String!
  createdAt: String!
  updatedAt: String!
}

type DownloadCandidate {
  title: String!
  tracker: String!
  infoHash: String!
  link: String!
  magnetUri: String!
  size: Long!
  seeders: Int!
  peers: Int!
}
