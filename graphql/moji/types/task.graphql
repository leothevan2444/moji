extend type Query {
  "List torrents from qBittorrent"
  qbittorrentTorrents(limit: Int): [QBTorrent!]!

  "Get a Moji download task by id"
  task(id: ID!): Task

  "List Moji download tasks, newest first"
  tasks: [Task!]!
}

type Mutation {
  "Add a torrent to qBittorrent via magnet or http(s) URL"
  qbittorrentAdd(input: QBittorrentAddInput!): Boolean! @deprecated(reason: "Use addTorrent for persisted Moji task tracking.")

  "Add a torrent URL or magnet and create a persisted Moji task"
  addTorrent(input: QBittorrentAddInput!): Task!

  "Search torrent candidates and create a Moji download task"
  downloadMedia(input: DownloadMediaInput!): Task!

  "Synchronize Moji task progress from qBittorrent"
  syncTaskProgress: [Task!]!

  "Trigger a Stash metadata scan for a single completed Moji task"
  triggerTaskStashScan(id: ID!): Task!

  "Trigger Stash metadata scans for completed Moji tasks"
  triggerStashScans: [Task!]!

  "Retry a blocked Moji task from its current stage"
  retryTask(id: ID!): Task!

  "Resolve a blocked sourcing task with a manually selected torrent"
  resolveBlockedSourcingTask(id: ID!, input: ResolveBlockedSourcingTaskInput!): Task!

  "Delete a persisted Moji task record"
  deleteTask(id: ID!): Task!

  "Retry blocked tasks with per-task results"
  retryTasks(ids: [ID!]!): TaskBatchPayload!

  "Advance selected tasks through transfer and Stash ingest"
  processTaskIngest(ids: [ID!]!): TaskBatchPayload!

  "Delete selected tasks using the configured deletion policy"
  deleteTasks(ids: [ID!]!): TaskBatchPayload!
}

type QBTorrent {
  hash: String!
  name: String!
  progress: Float!
  state: String!
  dlspeed: Long!
  upspeed: Long!
  size: Long!
  eta: Long!
  category: String!
  tags: String!
  addedOn: Long!
}

input QBittorrentAddInput {
  url: String!
  savePath: String
  category: String
  tags: String
  paused: Boolean
}

input DownloadMediaInput {
  code: String!
  trackers: [String!]
  categories: [Int!]
  limit: Int
  savePath: String
  category: String
  tags: String
  paused: Boolean
}

input ResolveBlockedSourcingTaskInput {
  torrentUrl: String!
  title: String
  tracker: String
  infoHash: String
  size: Long
  seeders: Int
  peers: Int
  paused: Boolean
}

enum TaskSource {
  MANUAL
  SEARCH
  SUBSCRIPTION
}

type Task {
  id: ID!
  source: TaskSource!
  code: String!
  stage: TaskStage!
  stageStatus: TaskStageStatus!
  stageLabel: String!
  stageStatusLabel: String!
  stageErrorCode: String
  stageErrorMessage: String
  candidate: DownloadCandidate!
  torrentUrl: String!
  savePath: String
  category: String
  tags: String
  torrentHash: String
  torrentName: String
  progress: Float!
  qbittorrentState: String
  contentPath: String
  downloadCompletedAt: String
  deliveryMode: String
  mojiSourcePath: String
  transferAction: String
  mojiTransferPath: String
  transferError: String
  stashScanJobId: ID
  stashScanPath: String
  stashScanError: String
  stashScanHint: String
  stashScanStartedAt: String
  createdAt: String!
  updatedAt: String!
}

enum TaskStage {
  SOURCING
  DOWNLOADING
  PENDING_INGEST
  TRANSFERRING
  SCANNING
  COMPLETED
}

enum TaskStageStatus {
  PENDING
  RUNNING
  BLOCKED
  DONE
}

type DownloadCandidate {
  title: String!
  tracker: String!
  infoHash: String!
  link: String!
  magnetUri: String!
  size: Long!
  seeders: Int!
  peers: Int!
}

enum TaskBatchStatus {
  SUCCEEDED
  SKIPPED
  FAILED
}

type TaskBatchResult {
  taskId: ID!
  status: TaskBatchStatus!
  reasonCode: String!
  task: Task
}

type TaskBatchSummary {
  requestedCount: Int!
  succeededCount: Int!
  skippedCount: Int!
  failedCount: Int!
}

type TaskBatchPayload {
  batchId: ID!
  summary: TaskBatchSummary!
  results: [TaskBatchResult!]!
}
