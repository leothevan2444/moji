fragment StashIdFragment on StashID {
  endpoint
  stash_id
  updated_at
}

fragment PerformerFragment on Performer {
  id
  name
  disambiguation
  gender
  birthdate
  ethnicity
  country
  eye_color
  height_cm
  urls
  alias_list
  favorite
  image_path
  scene_count
  stash_ids {
    ...StashIdFragment
  }
  rating100
  custom_fields
}

fragment StudioNameFragment on Studio {
  id
  name
}

fragment SceneFragment on Scene {
  id
  title
  code
  date
  urls
  studio {
    ...StudioNameFragment
  }
  paths {
    screenshot
  }
  stash_ids {
    ...StashIdFragment
  }
  performers {
    id
    name
  }
  tags {
    id
    name
  }
}

query FindPerformerByID($id: ID!) {
  findPerformer(id: $id) {
    ...PerformerFragment
  }
}

query FindPerformers($performer_filter: PerformerFilterType, $filter: FindFilterType, $performer_ids: [Int!], $ids: [ID!]) {
  findPerformers(performer_filter: $performer_filter, filter: $filter, performer_ids: $performer_ids, ids: $ids) {
    count
    performers {
      ...PerformerFragment
    }
  }
}

query allPerformers {
  allPerformers {
    ...PerformerFragment
  }
}

query FindScenes($scene_filter: SceneFilterType, $filter: FindFilterType) {
  findScenes(scene_filter: $scene_filter, filter: $filter) {
    count
    scenes {
      ...SceneFragment
    }
  }
}

mutation UpdatePerformerCustomFields($input: PerformerUpdateInput!) {
  performerUpdate(input: $input) {
    ...PerformerFragment
  }
}

query GetVersion {
  version {
    hash
    build_time
    version
  }
}

mutation MetadataScan($input: ScanMetadataInput!) {
  metadataScan(input: $input)
}

query FindJob($input: FindJobInput!) {
  findJob(input: $input) {
    id
    status
    description
    progress
    startTime
    endTime
    addTime
    error
    subTasks
  }
}

fragment StashBoxFragment on StashBox {
  endpoint
  api_key
  name
  max_requests_per_minute
}

query Configuration {
  configuration {
    general {
      stashes {
        path
      }
      stashBoxes {
        ...StashBoxFragment
      }
    }
  }
}

query FindSceneCount {
  findScenes(filter: { per_page: 0 }) {
    count
  }
}
