<!doctype html>
<html lang="zh-CN" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f0e8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Moji Web UI</title>
    <script>
      // Apply the persisted locale before React mounts to keep lang/dir stable.
      (function () {
        try {
          var p = localStorage.getItem("moji:locale");
          var l = p === "en" ? "en" : p === "zh-CN" ? "zh-CN" : "zh-CN";
          if (p !== "en" && p !== "zh-CN") {
            var languages = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || ""]);
            for (var i = 0; i < languages.length; i += 1) {
              var candidate = String(languages[i]).toLowerCase().replace(/_/g, "-");
              if (candidate === "zh" || candidate.indexOf("zh-") === 0) { l = "zh-CN"; break; }
              if (candidate === "en" || candidate.indexOf("en-") === 0) { l = "en"; break; }
            }
          }
          document.documentElement.lang = l;
          document.documentElement.dir = "ltr";
        } catch (e) { /* default HTML attributes remain valid */ }
      })();
      // 防 FOUC：在 React 挂载前同步设置 data-theme。
      // 逻辑与 src/hooks/useTheme.ts 保持一致：只接受 "light" / "dark"，
      // 其余情况（含 auto / 异常 / 无值）移除属性，让 prefers-color-scheme 媒体查询接管。
      (function () {
        try {
          var k = localStorage.getItem("moji:theme");
          if (k === "light" || k === "dark") {
            document.documentElement.setAttribute("data-theme", k);
          } else {
            document.documentElement.removeAttribute("data-theme");
          }
        } catch (e) {
          /* localStorage 不可用时静默忽略，回到 auto */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
