query DashboardDocument {
  health {
    ok
    message
  }
  version
  dashboardStats {
    total
    active
    completed
    downloading
    pendingScans
    failed
  }
  settings {
    stash {
      configured
      enabled
      url
      apiKeyConfigured
      apiKey
    }
    ingest {
      mode
      sharedStorage {
        qbittorrentPathPrefix
        stashPathPrefix
      }
      fileTransfer {
        action
        targetPath
      }
      libraryScan {
        libraryPath
      }
    }
    jackett {
      configured
      enabled
      url
      apiKeyConfigured
      apiKey
      passwordConfigured
      password
    }
    qbittorrent {
      configured
      enabled
      url
      username
      usernameConfigured
      passwordConfigured
      password
      defaultSavePath
      category
      tags
    }
    automation {
      taskProgressSyncIntervalSeconds
      subscriptionPollIntervalSeconds
    }
    subscription {
      stashBoxEndpoints
    }
  }
  settingsStatus {
    stash {
      configured
      enabled
    }
    jackett {
      configured
      enabled
    }
    qbittorrent {
      configured
      enabled
    }
    automation {
      taskProgressSyncIntervalSeconds
      taskProgressSyncEnabled
      subscriptionPollIntervalSeconds
      subscriptionPollEnabled
    }
    subscription {
      stashBoxes {
        name
        endpoint
        apiKeyConfigured
      }
      stashBoxesLoaded
      stashBoxesLoadError
    }
    ingest {
      configured
    }
    stashStats {
      version
      sceneCount
      pendingMojiScanCount
      lastError
      okAt
    }
    jackettStats {
      indexerCount
      configuredIndexerCount
      lastIndexerLatencyMs
      lastIndexerError
      lastIndexerSearchAt
      lastError
      okAt
    }
    qbittorrentStats {
      downloadSpeed
      uploadSpeed
      activeTorrentCount
      connectionStatus
      altSpeedLimitEnabled
      lastError
      okAt
    }
  }
  tasks {
    id
    query
    status
    torrentName
    progress
    qbittorrentState
    contentPath
    torrentHash
    savePath
    category
    tags
    error
    completedAt
    stashMode
    stashSourcePath
    stashTransferAction
    stashTransferPath
    stashTransferStatus
    stashTransferError
    stashJobId
    stashScanPath
    stashScanStatus
    stashScanError
    stashScanHint
    createdAt
    updatedAt
  }
}
