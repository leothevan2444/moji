query DashboardDocument {
  health {
    ok
    message
  }
  version
  dashboardStats {
    total
    active
    completed
    downloading
    pendingScans
    failed
  }
  settings {
    stash {
      configured
      enabled
      url
      apiKeyConfigured
      libraryPath
    }
    jackett {
      configured
      enabled
      url
      apiKeyConfigured
    }
    qbittorrent {
      configured
      enabled
      url
      username
      usernameConfigured
      passwordConfigured
      defaultSavePath
      category
      tags
    }
    tasks {
      store
      dbPath
      progressSyncIntervalSeconds
      progressSyncEnabled
    }
    subscription {
      store
      dbPath
      pollIntervalSeconds
      pollEnabled
      javstashEnabled
      javstashApiKeyConfigured
    }
    logging {
      level
      filePath
      maxEntries
      maxFileSizeBytes
      maxFileBackups
    }
    system {
      appVersion
    }
  }
  tasks {
    id
    query
    status
    torrentName
    progress
    qbittorrentState
    contentPath
    torrentHash
    savePath
    category
    tags
    error
    completedAt
    stashJobId
    stashScanStatus
    stashScanError
    createdAt
    updatedAt
  }
}
