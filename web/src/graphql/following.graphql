query StashPerformers($search: String, $page: Int, $pageSize: Int) {
  stashPerformers(search: $search, page: $page, pageSize: $pageSize) {
    items {
      id
      name
      aliasList
      favorite
      imagePath
      sceneCount
      followed
    }
    page
    pageSize
    totalCount
    totalPages
    hasPrevPage
    hasNextPage
  }
}

query FollowingPerformers {
  followingPerformers {
    performer {
      id
      name
      aliasList
      favorite
      imagePath
      sceneCount
      followed
    }
    lastCheckedAt
    lastError
    pendingReleaseCount
    processedReleaseCount
    recentReleases {
      key
      source
      title
      code
      date
      url
      query
      taskID
      seenAt
    }
  }
}

mutation FollowPerformer($stashPerformerID: ID!) {
  followPerformer(stashPerformerID: $stashPerformerID) {
    performer {
      id
      followed
    }
  }
}

mutation UnfollowPerformer($stashPerformerID: ID!) {
  unfollowPerformer(stashPerformerID: $stashPerformerID)
}

mutation RefreshFollowingPerformer($stashPerformerID: ID!) {
  refreshFollowingPerformer(stashPerformerID: $stashPerformerID) {
    performer {
      id
      followed
    }
    lastCheckedAt
    lastError
    pendingReleaseCount
    processedReleaseCount
    recentReleases {
      key
      title
      code
      date
      query
      taskID
      seenAt
    }
  }
}

mutation RefreshFollowingNow {
  refreshFollowingNow {
    performer {
      id
    }
  }
}
