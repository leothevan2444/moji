query HomePageDocument {
  settings {
    stash {
      url
    }
    ingest {
      deliveryMode
      downloads {
        qbRoot
        mojiRoot
      }
      library {
        mojiRoot
        stashRoot
      }
      transfer {
        action
      }
    }
    jackett {
      url
    }
    qbittorrent {
      url
      username
      defaultSavePath
    }
  }
  settingsStatus {
    stash {
      configured
      ready
    }
    jackett {
      configured
      ready
    }
    qbittorrent {
      configured
      ready
    }
    ingest {
      configured
    }
    stashStats {
      version
      sceneCount
      pendingMojiScanCount
      lastError
      okAt
    }
    jackettStats {
      indexerCount
      configuredIndexerCount
      lastIndexerLatencyMs
      lastIndexerError
      lastIndexerSearchAt
      lastError
      okAt
    }
    qbittorrentStats {
      downloadSpeed
      uploadSpeed
      activeTorrentCount
      connectionStatus
      altSpeedLimitEnabled
      lastError
      okAt
    }
  }
  tasks {
    id
    source
    code
    stage
    stageStatus
    stageLabel
    stageStatusLabel
    stageErrorCode
    stageErrorMessage
    torrentUrl
    torrentName
    progress
    qbittorrentState
    contentPath
    torrentHash
    savePath
    category
    tags
    downloadCompletedAt
    deliveryMode
    mojiSourcePath
    transferAction
    mojiTransferPath
    transferError
    stashScanJobId
    stashScanPath
    stashScanError
    stashScanHint
    stashScanStartedAt
    createdAt
    updatedAt
  }
}
