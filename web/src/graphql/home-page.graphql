query HomePageDocument {
  settings {
    stash {
      url
    }
    ingest {
      deliveryMode
      downloads {
        qbRoot
        mojiRoot
      }
      library {
        mojiRoot
        stashRoot
      }
      transfer {
        action
      }
    }
    jackett {
      url
    }
    qbittorrent {
      url
      username
      defaultSavePath
    }
  }
  tasks {
    id
    source
    code
    stage
    stageStatus
    stageLabel
    stageStatusLabel
    stageErrorCode
    stageErrorMessage
    torrentUrl
    torrentName
    progress
    qbittorrentState
    contentPath
    torrentHash
    savePath
    category
    tags
    downloadCompletedAt
    deliveryMode
    mojiSourcePath
    transferAction
    mojiTransferPath
    transferError
    stashScanJobId
    stashScanPath
    stashScanError
    stashScanHint
    stashScanStartedAt
    createdAt
    updatedAt
  }
}
