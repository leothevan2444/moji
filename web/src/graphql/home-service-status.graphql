query HomeServiceStatus {
  settingsStatus {
    stash {
      configured
      ready
    }
    jackett {
      configured
      ready
    }
    qbittorrent {
      configured
      ready
    }
    ingest {
      configured
    }
    stashStats {
      version
      sceneCount
      pendingMojiScanCount
      lastError
      okAt
    }
    jackettStats {
      indexerCount
      configuredIndexerCount
      lastIndexerLatencyMs
      lastIndexerError
      lastIndexerSearchAt
      lastError
      okAt
    }
    qbittorrentStats {
      downloadSpeed
      uploadSpeed
      activeTorrentCount
      connectionStatus
      altSpeedLimitEnabled
      lastError
      okAt
    }
  }
}
