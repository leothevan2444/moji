query DiscoverConfigDocument {
  settings {
    automation {
      torrentSelection {
        inspectionCandidateLimit
      }
    }
  }
}

query PerformersConfigDocument {
  settings {
    stash {
      url
    }
  }
}

query StatsPageDocument {
  dashboardStats {
    active
    completed
    pendingScans
    failed
  }
}
