query DiscoverScenesDocument($input: DiscoverScenesInput!) {
  discoverScenes(input: $input) {
    items {
      key
      sceneId
      stashBoxEndpoint
      stashBoxName
      title
      durationSeconds
      code
      date
      studioName
      imageUrl
      url
      performerNames
      derivedQuery
    }
    usedStashBox {
      name
      endpoint
      performerId
      performerName
    }
    fallbackCount
    searchedQuery
  }
}

query SearchDocument($input: JackettSearchInput!) {
  jackettSearch(input: $input) {
    title
    size
    seeders
    peers
    tracker
    trackerId
    categoryDesc
    publishDate
    details
    link
    magnetUri
    infoHash
  }
}

query PreviewJackettSelectionDocument($input: PreviewJackettSelectionInput!) {
  previewJackettSelection(input: $input) {
    results {
      title
      size
      seeders
      peers
      tracker
      trackerId
      categoryDesc
      publishDate
      details
      link
      magnetUri
      infoHash
    }
    previewMeta {
      appliedFastRules
      appliedFileRules
      inspectedCount
      inspectableCount
    }
  }
}

query JackettIndexersDocument {
  jackettIndexers {
    id
    name
    enabled
  }
}

mutation QueueDiscoveredSceneDocument($input: QueueDiscoveredSceneInput!) {
  queueDiscoveredScene(input: $input) {
    id
    source
    status
    query
    torrentName
    progress
    stashMode
    stashScanStatus
    createdAt
  }
}
