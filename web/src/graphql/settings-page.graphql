query SettingsPageDocument {
  version
  settings {
    stash {
      configured
      url
      apiKeyConfigured
      apiKey
    }
    ingest {
      deliveryMode
      downloads {
        qbRoot
        mojiRoot
      }
      library {
        mojiRoot
        stashRoot
      }
      transfer {
        action
      }
    }
    jackett {
      configured
      url
      apiKeyConfigured
      apiKey
      passwordConfigured
      password
    }
    qbittorrent {
      configured
      url
      username
      usernameConfigured
      passwordConfigured
      password
      defaultSavePath
      category
      tags
    }
    automation {
      taskProgressSyncIntervalSeconds
      subscriptionPollIntervalHours
      stashBoxEndpoints
      subscriptionReleasePolicy {
        soloBehavior
        groupBehavior
        compilationBehavior
        maxGroupPerformerCount
        releaseDateRange
      }
      torrentSelection {
        enabled
        inspectionCandidateLimit
        fastRules {
          type
          enabled
          publishDate {
            direction
          }
          seeders {
            direction
          }
          size {
            direction
          }
          indexerPreference {
            trackerIds
          }
          titleMatch {
            clauses {
              pattern
              patternMode
              effect
            }
          }
          torrentFileNameMatch {
            clauses {
              pattern
              patternMode
              effect
            }
          }
        }
        torrentRules {
          type
          enabled
          publishDate {
            direction
          }
          seeders {
            direction
          }
          size {
            direction
          }
          indexerPreference {
            trackerIds
          }
          titleMatch {
            clauses {
              pattern
              patternMode
              effect
            }
          }
          torrentFileNameMatch {
            clauses {
              pattern
              patternMode
              effect
            }
          }
        }
      }
    }
    system {
      taskDeletePolicy
      imageCache {
        enabled
        maxSizeMb
        retentionDays
      }
    }
  }
  settingsStatus {
    imageCache {
      usedBytes
      entryCount
      cacheDirectory
      lastCleanupAt
      lastError
    }
    stash {
      configured
      ready
    }
    jackett {
      configured
      ready
    }
    qbittorrent {
      configured
      ready
    }
    automation {
      taskProgressSyncIntervalSeconds
      taskProgressSyncEnabled
      subscriptionPollIntervalHours
      subscriptionPollEnabled
    }
    subscription {
      stashBoxes {
        name
        endpoint
        apiKeyConfigured
      }
      stashBoxesLoaded
      stashBoxesLoadError
    }
    stashLibraries {
      path
    }
    stashLibrariesLoadError
    ingest {
      configured
    }
    stashStats {
      version
      sceneCount
      pendingMojiScanCount
      lastError
      okAt
    }
    jackettStats {
      indexerCount
      configuredIndexerCount
      lastIndexerLatencyMs
      lastIndexerError
      lastIndexerSearchAt
      lastError
      okAt
    }
    qbittorrentStats {
      downloadSpeed
      uploadSpeed
      activeTorrentCount
      connectionStatus
      altSpeedLimitEnabled
      lastError
      okAt
    }
  }
}
