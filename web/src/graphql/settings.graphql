mutation UpdateStashSettingsDocument($input: UpdateStashSettingsInput!) {
  updateStashSettings(input: $input) {
    stash {
      configured
      enabled
      url
      apiKeyConfigured
      mode
      libraryPath
      qbittorrentPathPrefix
      stashPathPrefix
      transferAction
      transferTargetPath
    }
  }
}

mutation UpdateJackettSettingsDocument($input: UpdateJackettSettingsInput!) {
  updateJackettSettings(input: $input) {
    jackett {
      configured
      enabled
      url
      apiKeyConfigured
    }
  }
}

mutation UpdateQBittorrentSettingsDocument($input: UpdateQBittorrentSettingsInput!) {
  updateQBittorrentSettings(input: $input) {
    qbittorrent {
      configured
      enabled
      url
      username
      usernameConfigured
      passwordConfigured
      defaultSavePath
      category
      tags
    }
  }
}

mutation UpdateSubscriptionSettingsDocument($input: UpdateSubscriptionSettingsInput!) {
  updateSubscriptionSettings(input: $input) {
    subscription {
      store
      dbPath
      pollIntervalSeconds
      pollEnabled
      stashBoxes {
        name
        endpoint
        apiKeyConfigured
      }
      stashBoxEndpoints
      stashBoxesLoaded
      stashBoxesLoadError
    }
  }
}

mutation UpdateLoggingSettingsDocument($input: UpdateLoggingSettingsInput!) {
  updateLoggingSettings(input: $input) {
    logging {
      level
      filePath
      maxEntries
      maxFileSizeBytes
      maxFileBackups
    }
  }
}

mutation RefreshSubscriptionStashBoxesDocument {
  refreshSubscriptionStashBoxes {
    subscription {
      store
      dbPath
      pollIntervalSeconds
      pollEnabled
      stashBoxes {
        name
        endpoint
        apiKeyConfigured
      }
      stashBoxEndpoints
      stashBoxesLoaded
      stashBoxesLoadError
    }
  }
}

query LogsDocument($limit: Int, $minLevel: LogLevel) {
  logs(limit: $limit, minLevel: $minLevel) {
    time
    level
    message
  }
}
