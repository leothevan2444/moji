mutation UpdateStashSettingsDocument($input: UpdateStashSettingsInput!) {
  updateStashSettings(input: $input) {
    stash {
      configured
      enabled
      url
      apiKeyConfigured
      libraryPath
    }
  }
}

mutation UpdateJackettSettingsDocument($input: UpdateJackettSettingsInput!) {
  updateJackettSettings(input: $input) {
    jackett {
      configured
      enabled
      url
      apiKeyConfigured
    }
  }
}

mutation UpdateQBittorrentSettingsDocument($input: UpdateQBittorrentSettingsInput!) {
  updateQBittorrentSettings(input: $input) {
    qbittorrent {
      configured
      enabled
      url
      username
      usernameConfigured
      passwordConfigured
      defaultSavePath
      category
      tags
    }
  }
}

mutation UpdateFollowingSettingsDocument($input: UpdateFollowingSettingsInput!) {
  updateFollowingSettings(input: $input) {
    following {
      store
      jsonPath
      pollIntervalSeconds
      pollEnabled
      javstashEnabled
      javstashApiKeyConfigured
    }
  }
}
