mutation UpdateStashSettingsDocument($input: UpdateStashSettingsInput!) {
  updateStashSettings(input: $input) {
    stash {
      configured
      url
      apiKeyConfigured
    }
  }
}

mutation UpdateIngestSettingsDocument($input: UpdateIngestSettingsInput!) {
  updateIngestSettings(input: $input) {
    ingest {
      deliveryMode
      downloads {
        qbRoot
        mojiRoot
      }
      library {
        mojiRoot
        stashRoot
      }
      transfer {
        action
      }
    }
  }
}

mutation UpdateJackettSettingsDocument($input: UpdateJackettSettingsInput!) {
  updateJackettSettings(input: $input) {
    jackett {
      configured
      url
      apiKeyConfigured
    }
  }
}

mutation UpdateQBittorrentSettingsDocument($input: UpdateQBittorrentSettingsInput!) {
  updateQBittorrentSettings(input: $input) {
    qbittorrent {
      configured
      url
      username
      usernameConfigured
      passwordConfigured
      defaultSavePath
      category
      tags
    }
  }
}

mutation UpdateAutomationSettingsDocument($input: UpdateAutomationSettingsInput!) {
  updateAutomationSettings(input: $input) {
    automation {
      taskProgressSyncIntervalSeconds
      subscriptionPollIntervalHours
      stashBoxEndpoints
      subscriptionReleasePolicy {
        soloBehavior
        groupBehavior
        compilationBehavior
        maxGroupPerformerCount
        releaseDateRange
      }
      torrentSelection {
        enabled
        inspectionCandidateLimit
        fastRules {
          type
          enabled
          publishDate {
            direction
          }
          seeders {
            direction
          }
          size {
            direction
          }
          indexerPreference {
            trackerIds
          }
          titleMatch {
            clauses {
              pattern
              patternMode
              effect
            }
          }
          torrentFileNameMatch {
            clauses {
              pattern
              patternMode
              effect
            }
          }
        }
        torrentRules {
          type
          enabled
          publishDate {
            direction
          }
          seeders {
            direction
          }
          size {
            direction
          }
          indexerPreference {
            trackerIds
          }
          titleMatch {
            clauses {
              pattern
              patternMode
              effect
            }
          }
          torrentFileNameMatch {
            clauses {
              pattern
              patternMode
              effect
            }
          }
        }
      }
    }
  }
}

mutation UpdateSystemSettingsDocument($input: UpdateSystemSettingsInput!) {
  updateSystemSettings(input: $input) {
    system {
      taskDeletePolicy
      imageCache {
        enabled
        maxSizeMb
        retentionDays
      }
    }
  }
}

mutation ClearImageCacheDocument {
  clearImageCache {
    usedBytes
    entryCount
    cacheDirectory
    lastCleanupAt
    lastError
  }
}

mutation RefreshStashBoxes {
  refreshStashBoxes {
    automation {
      stashBoxEndpoints
    }
  }
}

query LogsDocument($limit: Int, $minLevel: LogLevel) {
  logs(limit: $limit, minLevel: $minLevel) {
    sequence
    time
    level
    message
  }
}
