mutation UpdateStashSettingsDocument($input: UpdateStashSettingsInput!) {
  updateStashSettings(input: $input) {
    stash {
      configured
      url
      apiKeyConfigured
    }
  }
}

mutation UpdateIngestSettingsDocument($input: UpdateIngestSettingsInput!) {
  updateIngestSettings(input: $input) {
    ingest {
      deliveryMode
      stashLibraryPath
      transfer {
        action
        mojiSourceRoot
        mojiTargetRoot
      }
    }
  }
}

mutation UpdateJackettSettingsDocument($input: UpdateJackettSettingsInput!) {
  updateJackettSettings(input: $input) {
    jackett {
      configured
      url
      apiKeyConfigured
    }
  }
}

mutation UpdateQBittorrentSettingsDocument($input: UpdateQBittorrentSettingsInput!) {
  updateQBittorrentSettings(input: $input) {
    qbittorrent {
      configured
      url
      username
      usernameConfigured
      passwordConfigured
      defaultSavePath
      category
      tags
    }
  }
}

mutation UpdateAutomationSettingsDocument($input: UpdateAutomationSettingsInput!) {
  updateAutomationSettings(input: $input) {
    automation {
      taskProgressSyncIntervalSeconds
      subscriptionPollIntervalHours
      stashBoxEndpoints
      torrentSelection {
        enabled
        rules {
          id
          type
          enabled
          direction
          indexerPreference {
            trackerIds
          }
          titleMatch {
            clauses {
              pattern
              patternMode
              effect
            }
          }
        }
      }
    }
  }
}

mutation UpdateSystemSettingsDocument($input: UpdateSystemSettingsInput!) {
  updateSystemSettings(input: $input) {
    system {
      taskDeletePolicy
    }
  }
}

mutation RefreshSubscriptionStashBoxesDocument {
  refreshSubscriptionStashBoxes {
    automation {
      stashBoxEndpoints
    }
  }
}

query LogsDocument($limit: Int, $minLevel: LogLevel) {
  logs(limit: $limit, minLevel: $minLevel) {
    time
    level
    message
  }
}
