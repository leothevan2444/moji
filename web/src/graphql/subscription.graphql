query StashPerformers($search: String, $page: Int, $pageSize: Int) {
  stashPerformers(search: $search, page: $page, pageSize: $pageSize) {
    items {
      id
      name
      aliasList
      favorite
      imagePath
      sceneCount
      subscribed
    }
    page
    pageSize
    totalCount
    totalPages
    hasPrevPage
    hasNextPage
  }
}

query PerformerWorkspace($search: String, $page: Int, $pageSize: Int) {
  performerWorkspace(search: $search, page: $page, pageSize: $pageSize) {
    performers {
      items {
        id
        name
        aliasList
        favorite
        imagePath
        sceneCount
        subscribed
      }
      page
      pageSize
      totalCount
      totalPages
      hasPrevPage
      hasNextPage
    }
    subscribedPerformers {
      performer {
        id
        name
        aliasList
        favorite
        imagePath
        sceneCount
        subscribed
      }
      lastCheckedAt
      lastError
      pendingReleaseCount
      processedReleaseCount
      recentReleases {
        key
        title
        code
        date
        seenAt
      }
    }
  }
}

query StashPerformerDetail($id: ID!) {
  stashPerformerDetail(id: $id) {
    performer {
      id
      name
      aliasList
      favorite
      imagePath
      sceneCount
      subscribed
    }
    disambiguation
    birthdate
    ethnicity
    country
    eyeColor
    heightCm
    rating100
    urls
    matchedStashBox {
      name
      endpoint
      performerId
      performerName
    }
    totalSceneCount
    stashSceneCount
    stashBoxSceneCount
    dedupedSceneCount
  }
}

query StashPerformerScenes($id: ID!, $input: StashPerformerScenesInput!) {
  stashPerformerScenes(id: $id, input: $input) {
    items {
      key
      primarySource
      sourceSceneId
      title
      code
      date
      studioName
      performerCount
      tagCount
      performers {
        id
        name
      }
      tags {
        id
        name
      }
      imageUrl
      url
      inLibrary
      matchedStashSceneId
      hasStashSource
      hasStashBoxSource
      stashBoxSceneId
      stashBoxEndpoint
      sourceLabels
      stashIds {
        endpoint
        stashId
      }
      mojiTask {
        id
        stage
        stageStatus
        stageLabel
        stageStatusLabel
        progress
      }
    }
    page
    pageSize
    totalCount
    totalPages
    hasPrevPage
    hasNextPage
    stashSceneCount
    stashBoxCount
    dedupedCount
    totalCountExact
    stashBoxRemoteCount
    stashBoxLoadedCount
    cacheComplete
    cacheUpdatedAt
    cacheStale
  }
}

mutation RefreshStashPerformerScenes($id: ID!, $input: StashPerformerScenesInput!) {
  refreshStashPerformerScenes(id: $id, input: $input) {
    items { key }
    page
    pageSize
    totalCount
    totalPages
    hasPrevPage
    hasNextPage
    stashSceneCount
    stashBoxCount
    dedupedCount
    totalCountExact
    stashBoxRemoteCount
    stashBoxLoadedCount
    cacheComplete
    cacheUpdatedAt
    cacheStale
  }
}

