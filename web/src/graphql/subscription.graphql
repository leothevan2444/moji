query StashPerformers($search: String, $page: Int, $pageSize: Int) {
  stashPerformers(search: $search, page: $page, pageSize: $pageSize) {
    items {
      id
      name
      aliasList
      favorite
      imagePath
      sceneCount
      subscribed
    }
    page
    pageSize
    totalCount
    totalPages
    hasPrevPage
    hasNextPage
  }
}

query StashPerformerDetail($id: ID!) {
  stashPerformerDetail(id: $id) {
    performer {
      id
      name
      aliasList
      favorite
      imagePath
      sceneCount
      subscribed
    }
    disambiguation
    birthdate
    ethnicity
    country
    eyeColor
    heightCm
    rating100
    urls
    matchedStashBox {
      name
      endpoint
      performerId
      performerName
    }
    totalSceneCount
    stashSceneCount
    stashBoxSceneCount
    dedupedSceneCount
  }
}

query StashPerformerScenes($id: ID!, $input: StashPerformerScenesInput!) {
  stashPerformerScenes(id: $id, input: $input) {
    items {
      key
      primarySource
      sourceSceneId
      title
      code
      date
      studioName
      imageUrl
      url
      inLibrary
      matchedStashSceneId
      hasStashSource
      hasStashBoxSource
      stashBoxSceneId
      stashBoxEndpoint
      sourceLabels
      stashIds {
        endpoint
        stashId
      }
    }
    page
    pageSize
    totalCount
    totalPages
    hasPrevPage
    hasNextPage
    stashSceneCount
    stashBoxCount
    dedupedCount
  }
}

query SubscribedPerformers {
  subscribedPerformers {
    performer {
      id
      name
      aliasList
      favorite
      imagePath
      sceneCount
      subscribed
    }
    lastCheckedAt
    lastError
    pendingReleaseCount
    processedReleaseCount
    recentReleases {
      key
      source
      title
      code
      date
      url
      query
      taskID
      seenAt
    }
  }
}

mutation SubscribePerformer($stashPerformerID: ID!) {
  subscribePerformer(stashPerformerID: $stashPerformerID) {
    performer {
      id
      subscribed
    }
  }
}

mutation UnsubscribePerformer($stashPerformerID: ID!) {
  unsubscribePerformer(stashPerformerID: $stashPerformerID)
}

mutation RefreshSubscribedPerformer($stashPerformerID: ID!) {
  refreshSubscribedPerformer(stashPerformerID: $stashPerformerID) {
    performer {
      id
      subscribed
    }
    lastCheckedAt
    lastError
    pendingReleaseCount
    processedReleaseCount
    recentReleases {
      key
      title
      code
      date
      query
      taskID
      seenAt
    }
  }
}

mutation RefreshSubscriptionNow {
  refreshSubscriptionsNow {
    performer {
      id
    }
  }
}
