mutation SubscribePerformers($ids: [ID!]!) {
  subscribePerformers(ids: $ids) {
    ...PerformerBatchFields
  }
}

mutation UnsubscribePerformers($ids: [ID!]!) {
  unsubscribePerformers(ids: $ids) {
    ...PerformerBatchFields
  }
}

mutation RefreshSubscribedPerformers($ids: [ID!]!) {
  refreshSubscribedPerformers(ids: $ids) {
    ...PerformerBatchFields
  }
}

fragment PerformerBatchFields on PerformerBatchPayload {
  batchId
  summary {
    requestedCount
    succeededCount
    skippedCount
    failedCount
  }
  results {
    performerId
    status
    reasonCode
    performer {
      id
      name
      aliasList
      favorite
      imagePath
      sceneCount
      subscribed
    }
    state {
      performer {
        id
        name
        aliasList
        favorite
        imagePath
        sceneCount
        subscribed
      }
      lastCheckedAt
      lastError
      pendingReleaseCount
      processedReleaseCount
      recentReleases {
        key
        title
        code
        date
        seenAt
      }
    }
  }
}

mutation QueuePerformerScenes($input: QueuePerformerScenesInput!) {
  queuePerformerScenes(input: $input) {
    queuedTasks {
      id
      source
      stage
      stageStatus
      code
      createdAt
    }
    results {
      key
      status
      reasonCode
      resolvedCode
      task {
        id
        stage
        stageStatus
      }
    }
    summary {
      requestedCount
      queuedCount
      skippedCount
      failedCount
    }
  }
}
