mutation DeleteTaskDocument($id: ID!) {
  deleteTask(id: $id) {
    id
    source
    stage
    stageStatus
    stageLabel
    stageStatusLabel
    code
    updatedAt
  }
}

mutation RetryTaskDocument($id: ID!) {
  retryTask(id: $id) {
    id
    source
    stage
    stageStatus
    stageLabel
    stageStatusLabel
    stageErrorCode
    stageErrorMessage
    code
    progress
    qbittorrentState
    updatedAt
  }
}

mutation ResolveBlockedSourcingTaskDocument($id: ID!, $input: ResolveBlockedSourcingTaskInput!) {
  resolveBlockedSourcingTask(id: $id, input: $input) {
    id
    source
    stage
    stageStatus
    stageLabel
    stageStatusLabel
    stageErrorCode
    stageErrorMessage
    code
    candidate {
      title
      tracker
      infoHash
      size
      seeders
      peers
    }
    torrentUrl
    progress
    qbittorrentState
    updatedAt
  }
}
