mutation AddTorrentDocument($input: QBittorrentAddInput!) {
  addTorrent(input: $input) {
    id
    status
    query
    torrentName
    progress
    stashScanStatus
    createdAt
  }
}

mutation SyncTaskProgressDocument {
  syncTaskProgress {
    id
    status
    progress
    qbittorrentState
    updatedAt
  }
}

mutation TriggerStashScansDocument {
  triggerStashScans {
    id
    stashJobId
    stashScanStatus
    stashScanError
    updatedAt
  }
}

mutation TriggerTaskStashScanDocument($id: ID!) {
  triggerTaskStashScan(id: $id) {
    id
    stashJobId
    stashScanStatus
    stashScanError
    updatedAt
  }
}
