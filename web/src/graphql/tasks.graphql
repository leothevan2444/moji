mutation AddTorrentDocument($input: QBittorrentAddInput!) {
  addTorrent(input: $input) {
    id
    source
    status
    query
    torrentName
    progress
    stashMode
    stashScanStatus
    createdAt
  }
}

mutation SyncTaskProgressDocument {
  syncTaskProgress {
    id
    source
    status
    progress
    qbittorrentState
    updatedAt
  }
}

mutation TriggerStashScansDocument {
  triggerStashScans {
    id
    source
    stashMode
    stashTransferStatus
    stashTransferError
    stashJobId
    stashScanPath
    stashScanStatus
    stashScanError
    stashScanHint
    updatedAt
  }
}

mutation TriggerTaskStashScanDocument($id: ID!) {
  triggerTaskStashScan(id: $id) {
    id
    source
    stashMode
    stashTransferStatus
    stashTransferError
    stashJobId
    stashScanPath
    stashScanStatus
    stashScanError
    stashScanHint
    updatedAt
  }
}

mutation DeleteTaskDocument($id: ID!) {
  deleteTask(id: $id) {
    id
    source
    status
    query
    updatedAt
  }
}
