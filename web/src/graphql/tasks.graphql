query TaskDetailDocument($id: ID!) {
  task(id: $id) {
    id
    source
    code
    stage
    stageStatus
    stageLabel
    stageStatusLabel
    stageErrorCode
    stageErrorMessage
    candidate { title tracker infoHash link magnetUri size seeders peers }
    torrentUrl
    torrentName
    progress
    qbittorrentState
    contentPath
    torrentHash
    savePath
    category
    tags
    downloadCompletedAt
    deliveryMode
    mojiSourcePath
    transferAction
    mojiTransferPath
    transferError
    stashScanJobId
    stashScanPath
    stashScanError
    stashScanHint
    stashScanStartedAt
    createdAt
    updatedAt
  }
}

mutation AddTorrentDocument($input: QBittorrentAddInput!) {
  addTorrent(input: $input) {
    id
    source
    stage
    stageStatus
    stageLabel
    stageStatusLabel
    stageErrorCode
    stageErrorMessage
    code
    torrentName
    progress
    deliveryMode
    createdAt
  }
}

mutation SyncTaskProgressDocument {
  syncTaskProgress {
    id
    source
    stage
    stageStatus
    stageLabel
    stageStatusLabel
    progress
    qbittorrentState
    updatedAt
  }
}

mutation TriggerStashScansDocument {
  triggerStashScans {
