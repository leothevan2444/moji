mutation AddTorrentDocument($input: QBittorrentAddInput!) {
  addTorrent(input: $input) {
    id
    source
    stage
    stageStatus
    stageLabel
    stageStatusLabel
    stageErrorCode
    stageErrorMessage
    query
    code
    torrentName
    progress
    deliveryMode
    createdAt
  }
}

mutation SyncTaskProgressDocument {
  syncTaskProgress {
    id
    source
    stage
    stageStatus
    stageLabel
    stageStatusLabel
    progress
    qbittorrentState
    updatedAt
  }
}

mutation TriggerStashScansDocument {
  triggerStashScans {
    id
